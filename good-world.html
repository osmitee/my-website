<script>
    document.addEventListener("DOMContentLoaded", () => {
        const lightbox = document.getElementById("lightbox");
        const lightboxContent = document.querySelector(".lightbox-content");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxVideo = document.getElementById("lightbox-video");
        const lightboxCaption = document.getElementById("lightbox-caption");
        const dotsContainer = document.getElementById("lightbox-dots");
        const prevBtn = document.querySelector(".lightbox-arrow.prev");
        const nextBtn = document.querySelector(".lightbox-arrow.next");

        const items = Array.from(document.querySelectorAll(".grid-item"));
        let currentIndex = 0;
        let autoSlideTimeout;

        // Lifted to outer scope so showHero can always access them
        let currentDotIndex = 0;
        let dotElements = [];
        let galleryItems = [];

        function updateDots() {
            dotElements.forEach((d, i) => d.classList.toggle("active", i === currentDotIndex));
        }

        function nextSlide() {
            currentDotIndex = (currentDotIndex + 1) % galleryItems.length;
            showHero(galleryItems[currentDotIndex]);
            updateDots();
        }

        function resetAutoSlide() {
            clearTimeout(autoSlideTimeout);
            lightboxVideo.onended = null;

            const src = galleryItems[currentDotIndex];
            if (!src) return;

            if (src.endsWith(".mp4")) {
                // Video: advance when it ends
                lightboxVideo.onended = () => nextSlide();
            } else {
                // Image/GIF: advance after 2.1s
                autoSlideTimeout = setTimeout(() => nextSlide(), 2100);
            }
        }

        function showHero(src) {
            clearTimeout(autoSlideTimeout);
            lightboxVideo.onended = null;

            if (src.endsWith(".mp4")) {
                lightboxImg.style.display = "none";
                lightboxVideo.style.display = "block";
                lightboxVideo.src = encodeURI(src);
                lightboxVideo.muted = true;
                lightboxVideo.loop = false;
                lightboxVideo.autoplay = true;
                lightboxVideo.playsInline = true;

                lightboxVideo.oncanplaythrough = () => {
                    lightboxVideo.play();
                    // Set onended here so it fires after this specific video
                    lightboxVideo.onended = () => nextSlide();
                };
            } else {
                lightboxVideo.pause();
                lightboxVideo.style.display = "none";
                lightboxImg.style.display = "block";
                lightboxImg.src = encodeURI(src);
                // Start auto-advance timer for images/GIFs
                autoSlideTimeout = setTimeout(() => nextSlide(), 2100);
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            const item = items[currentIndex];
            const media = item.querySelector("img, video");
            if (!media) return;

            // Reset state
            clearTimeout(autoSlideTimeout);
            lightboxVideo.onended = null;
            currentDotIndex = 0;
            dotElements = [];
            galleryItems = item.dataset.gallery
                ? item.dataset.gallery.split(",").map(s => s.trim())
                : [];

            lightboxCaption.textContent = item.dataset.caption || "";
            dotsContainer.innerHTML = "";

            if (galleryItems.length > 0) {
                galleryItems.forEach((src, i) => {
                    const dot = document.createElement("span");
                    dot.classList.add("lightbox-heart");
                    dot.dataset.src = src;
                    if (i === 0) dot.classList.add("active");

                    dot.addEventListener("click", e => {
                        e.stopPropagation();
                        currentDotIndex = i;
                        clearTimeout(autoSlideTimeout);
                        showHero(src);
                        updateDots();
                    });

                    dotsContainer.appendChild(dot);
                    dotElements.push(dot);
                });

                showHero(galleryItems[0]);
            } else {
                // No gallery — just show the clicked item directly
                showHero(media.src);
            }

            lightbox.classList.add("active");
        }

        items.forEach((item, index) => {
            if (item.dataset.lightbox === "false") return;
            const media = item.querySelector("img, video");
            if (!media) return;
            media.addEventListener("click", e => {
                e.preventDefault();
                openLightbox(index);
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("active");
            lightboxVideo.pause();
            lightboxVideo.src = "";
            lightboxVideo.onended = null;
            clearTimeout(autoSlideTimeout);
        });

        lightboxContent.addEventListener("click", e => e.stopPropagation());

        prevBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex - 1 + items.length) % items.length);
        });

        nextBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex + 1) % items.length);
        });
    });
</script>
