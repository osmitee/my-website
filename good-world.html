<script>
    document.addEventListener("DOMContentLoaded", () => {
        const lightbox = document.getElementById("lightbox");
        const lightboxContent = document.querySelector(".lightbox-content");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxVideo = document.getElementById("lightbox-video");
        const lightboxCaption = document.getElementById("lightbox-caption");
        const prevBtn = document.querySelector(".lightbox-arrow.prev");
        const nextBtn = document.querySelector(".lightbox-arrow.next");

        const items = Array.from(document.querySelectorAll(".grid-item"));
        let currentIndex = 0;


       function openLightbox(index) {
            currentIndex = index;
            const item = items[currentIndex];

            // If the media is inside a link, get the img/video inside it
            const media = item.querySelector("img, video");
            if (!media) return;

            // Show image or video
            if (media.tagName === "IMG") {
                lightboxVideo.style.display = "none";
                lightboxImg.style.display = "block";
                lightboxImg.src = media.src;
            } else {
                lightboxImg.style.display = "none";
                lightboxVideo.style.display = "block";
                lightboxVideo.src = media.src;
                lightboxVideo.play();
            }

            // Show caption if exists
            const caption = item.dataset.caption || "";
            lightboxCaption.textContent = caption;

            lightbox.classList.add("active");
        }
        
        // Open lightbox on media click
        items.forEach((item, index) => {
            const media = item.querySelector("img, video");
            if (!media) return;

            media.addEventListener("click", e => {
                e.preventDefault(); // prevent navigating if it's a link
                openLightbox(index);
            });
        });

        // Close lightbox on background click
        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("active");
            lightboxVideo.pause();
            lightboxVideo.src = "";
        });

        // Stop clicks inside content from closing
        lightboxContent.addEventListener("click", e => e.stopPropagation());

      prevBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex - 1 + items.length) % items.length);
        });

        nextBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex + 1) % items.length);
        });

    });
</script>
