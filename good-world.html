<script>
    document.addEventListener("DOMContentLoaded", () => {
        const lightbox = document.getElementById("lightbox");
        const lightboxContent = document.querySelector(".lightbox-content");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxVideo = document.getElementById("lightbox-video");
        const lightboxCaption = document.getElementById("lightbox-caption");
        const dotsContainer = document.getElementById("lightbox-dots");
        const prevBtn = document.querySelector(".lightbox-arrow.prev");
        const nextBtn = document.querySelector(".lightbox-arrow.next");

        const items = Array.from(document.querySelectorAll(".grid-item"));
        let currentIndex = 0;
        let autoSlideInterval;
        let currentDotIndex = 0;
        let dotElements = [];

        function showHero(src, isVideo = false) {
            if (isVideo || src.endsWith(".mp4")) {
                lightboxImg.style.display = "none";
                lightboxVideo.style.display = "block";
                lightboxVideo.src = src;
                lightboxVideo.muted = true;
                lightboxVideo.loop = true;
                lightboxVideo.autoplay = true;
                lightboxVideo.playsInline = true;
                lightboxVideo.play();
            } else {
                lightboxVideo.style.display = "none";
                lightboxImg.style.display = "block";
                lightboxImg.src = src;
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            const item = items[currentIndex];
            const media = item.querySelector("img, video");
            if (!media) return;

            clearInterval(autoSlideInterval);
            showHero(media.src, media.tagName === "VIDEO");

            lightboxCaption.textContent = item.dataset.caption || "";

            dotsContainer.innerHTML = "";
            const galleryItems = item.dataset.gallery ? item.dataset.gallery.split(",").map(s => s.trim()) : [];
            currentDotIndex = 0;
            dotElements = [];

            if (galleryItems.length > 0) {
                galleryItems.forEach((src, i) => {
                    const dot = document.createElement("span");
                    dot.classList.add("lightbox-heart");
                    if (i === 0) dot.classList.add("active");

                    dot.addEventListener("click", e => {
                        e.stopPropagation();
                        currentDotIndex = i;
                        showHero(src, src.endsWith(".mp4"));
                        updateDots();
                        resetAutoSlide();
                    });

                    dotsContainer.appendChild(dot);
                    dotElements.push(dot);
                });

                function updateDots() {
                    dotElements.forEach((d, i) => d.classList.toggle("active", i === currentDotIndex));
                }

                function resetAutoSlide() {
                    clearInterval(autoSlideInterval);
                    autoSlideInterval = setInterval(() => {
                        currentDotIndex = (currentDotIndex + 1) % galleryItems.length;
                        showHero(galleryItems[currentDotIndex], galleryItems[currentDotIndex].endsWith(".mp4"));
                        updateDots();
                    }, 2500);
                }

                resetAutoSlide();
            }

            lightbox.classList.add("active");
        }

        items.forEach((item, index) => {
            const media = item.querySelector("img, video");
            if (!media) return;
            media.addEventListener("click", e => {
                e.preventDefault();
                openLightbox(index);
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("active");
            lightboxVideo.pause();
            lightboxVideo.src = "";
            clearInterval(autoSlideInterval);
        });

        lightboxContent.addEventListener("click", e => e.stopPropagation());

        prevBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex - 1 + items.length) % items.length);
        });

        nextBtn.addEventListener("click", e => {
            e.stopPropagation();
            openLightbox((currentIndex + 1) % items.length);
        });
    });

</script>
